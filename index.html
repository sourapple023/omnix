<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Infinite Void</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            pointer-events: none;
            user-select: none;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            transition: opacity 2s ease;
        }

        .hint {
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Infinite</h1>
        <div class="hint">Move to navigate • Scroll to accelerate</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        let width, height, lastTime;
        let stars = [];
        let speed = 0.05;
        let targetSpeed = 0.05;
        let mouseX = 0;
        let mouseY = 0;

        // Configuration
        const STAR_COUNT = 1000;
        const COLORS = ['#7eaeff', '#ffffff', '#ffedd1', '#6292ff'];

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = (Math.random() - 0.5) * 2000;
                this.y = (Math.random() - 0.5) * 2000;
                this.z = Math.random() * 2000;
                this.px = 0;
                this.py = 0;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
            }

            update(dt) {
                this.z -= speed * dt;
                
                // If star passes the camera, wrap it to the back
                if (this.z < 1) {
                    this.reset();
                    this.z = 2000;
                }
            }

            draw() {
                // Perspective projection
                const x = (this.x - mouseX * 0.5) * (600 / this.z);
                const y = (this.y - mouseY * 0.5) * (600 / this.z);

                const size = (1 - this.z / 2000) * 3;
                
                if (this.px !== 0) {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = size;
                    ctx.beginPath();
                    ctx.moveTo(x + width / 2, y + height / 2);
                    ctx.lineTo(this.px + width / 2, this.py + height / 2);
                    ctx.stroke();
                }

                this.px = x;
                this.py = y;
            }
        }

        function init() {
            resize();
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push(new Star());
            }
            // Fade out UI after 4 seconds
            setTimeout(() => ui.style.opacity = '0', 4000);
            requestAnimationFrame(loop);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX - width / 2;
            mouseY = e.clientY - height / 2;
        });

        window.addEventListener('wheel', (e) => {
            targetSpeed = Math.max(0.01, Math.min(2, targetSpeed + e.deltaY * -0.001));
        });

        function loop(time) {
            if (!lastTime) lastTime = time;
            const dt = time - lastTime;
            lastTime = time;

            // Smooth speed transition
            speed += (targetSpeed - speed) * 0.1;

            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; // Trail effect
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update(dt);
                star.draw();
            });

            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
